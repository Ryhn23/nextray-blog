<article class="post">
    <div class="post-header">
        <h1 class="post-title">{{title}}</h1>
        <div class="post-meta">Published on: <time>{{date}}</time></div>
    </div>
    <div class="content-body markdown-content">
        {{content}}
    </div>

    <div class="post-footer">
        <div class="comments-section">
            <h3>Comments</h3>
            <!-- Giscus placeholder -->
            <div id="giscus-container">
                <script src="https://giscus.app/client.js" data-repo="[ENTER REPO HERE]"
                    data-repo-id="[ENTER REPO ID HERE]" data-category="Announcements"
                    data-category-id="[ENTER CATEGORY ID HERE]" data-mapping="pathname" data-strict="0"
                    data-reactions-enabled="1" data-emit-metadata="0" data-input-position="bottom"
                    data-theme="transparent_dark" data-lang="id" crossorigin="anonymous" async>
                    </script>
            </div>
        </div>
    </div>
</article>
