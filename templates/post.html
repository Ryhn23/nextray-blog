<article class="post">
    <div class="post-header">
        <h1 class="post-title">{{title}}</h1>
        <div class="post-meta">Published on: <time>{{date}}</time></div>
    </div>
    <div class="content-body markdown-content">
        {{content}}
    </div>

    <div class="post-footer">
        <!-- Post Reactions Section -->
        <div class="post-reactions-container">
            <h4 class="reactions-title">What do you think about this post? Let me know!</h4>
            <div id="post-reactions" class="post-reactions reddit-style">
                <button type="button" class="post-reaction-btn upvote" data-emoji="upvote">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                </button>
                <span class="post-reaction-score">0</span>
            </div>
        </div>

        <div class="comments-section">
            <h3>Comments</h3>

            <!-- Dynamic comments list container -->
            <div id="comments-container" class="comments-container">
                <div class="loading-comments">Loading comments...</div>
            </div>

            <form id="comment-form" class="comment-form">
                <input type="hidden" id="comment-post-id" value="{{page_id}}">
                <input type="hidden" id="comment-parent-id" value="">

                <!-- Reply Indicator -->
                <div id="reply-indicator" class="reply-indicator" style="display: none;">
                    <span>Replying to <strong id="reply-target-author"></strong></span>
                    <button type="button" id="cancel-reply-btn" class="cancel-reply-btn"
                        title="Cancel reply">&times;</button>
                </div>

                <div class="form-group-row">
                    <div class="form-group">
                        <label for="comment-nickname">Name</label>
                        <input type="text" id="comment-nickname" required placeholder="Your nickname..."
                            autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment-message">Message</label>
                    <textarea id="comment-message" required placeholder="Write your comment here..."
                        rows="4"></textarea>
                </div>

                <button type="submit" id="comment-submit-btn" class="btn-minimal">Post Comment</button>
            </form>
        </div>
    </div>
</article>
