<article class="post">
    <div class="post-header">
        <h1 class="post-title">{{title}}</h1>
        <div class="post-meta">Published on: <time>{{date}}</time></div>
    </div>
    <div class="content-body markdown-content">
        {{content}}
    </div>

    <div class="post-footer">
        <div class="comments-section">
            <h3>Comments</h3>
            
            <!-- Dynamic comments list container -->
            <div id="comments-container" class="comments-container">
                <div class="loading-comments">Memuat komentar...</div>
            </div>

            <!-- Custom native comment form -->
            <form id="comment-form" class="comment-form">
                <input type="hidden" id="comment-post-id" value="{{page_id}}">
                
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="comment-nickname">Nama</label>
                        <input type="text" id="comment-nickname" required placeholder="Nama samaranmu..." autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment-message">Pesan</label>
                    <textarea id="comment-message" required placeholder="Tulis komentar di sini..." rows="4"></textarea>
                </div>

                <button type="submit" id="comment-submit-btn" class="btn-minimal">Kirim Komentar</button>
            </form>
        </div>
    </div>
</article>
